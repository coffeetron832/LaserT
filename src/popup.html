<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { 
      font-family: Arial, sans-serif; 
      width: 170px; 
      padding: 10px; 
      margin: 0; 
    }
    h3 { 
      margin-top: 0; 
      margin-bottom: 10px;
      font-size: 14px; 
      color: #333; 
    }
    label { 
      display: block; 
      margin-bottom: 8px; 
      cursor: pointer; 
      font-size: 13px;
    }
    input { 
      margin-right: 8px; 
    }
    hr {
      border: 0;
      height: 1px;
      background: #e0e0e0;
      margin: 12px 0 8px 0;
    }
    .footer {
      font-size: 10px;
      color: #888;
      line-height: 1.4;
      text-align: left;
    }
    .footer .version {
      font-weight: bold;
      color: #555;
    }
  </style>
</head>
<body>
  <h3>Laser Color</h3>
  <label>
    <input type="radio" name="color" value="#00ff00" checked> Green
  </label>
  <label>
    <input type="radio" name="color" value="#ff0000"> Red
  </label>

  <hr>

  <div class="footer">
    <div class="version">LáserT v1.0</div>
    <div>&copy; 2026 japh / coffeetron832 - All Rights Reserved</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
